<!DOCTYPE html>
<html lang="en">
<head>
    <title>Battle City Inn - Booking</title>
    <meta charset="utf-8">
    <link href="css/styles.css" rel="stylesheet">
	<!-- This is where the JavaScript file is linked -->

</head>
<body style="background-image: url(images/kcorp.jpg); background-repeat: no-repeat; background-size: cover; background-attachment: fixed;">

<div id="wrapper">
    <header>
        <h1 style="color: black;">Battle City Inn.</h1>
    </header>
        
    <nav>
        <ul> 
            <li><a href="index.html">Home</a></li>
            <li><a href="rooms/room1.html">Pharaoh Room</a></li>
            <li><a href="rooms/room2.html">Champion Room</a></li>
            <li><a href="events/weekend.html">Weekend Events</a></li>
            <li><a href="contact.html">Contact</a></li>
            <li><a href="entertainment.html">Entertainment</a></li>
            <li><a href="additional benefits.html">Additional Benefits</a></li> 
        </ul>
    </nav>

    <main style="background: rgba(255, 255, 255, 0.95); padding: 30px; border-radius: 8px; margin: 20px; color: black; font-family: sans-serif; border: 2px solid #000; text-align: center;">
        <h2 style="border-bottom: 2px solid #000; padding-bottom: 10px;">Book Your Stay</h2>
        
        <form id="calcForm">
            <div style="margin-bottom: 20px;">
                <label for="userName"><strong>Guest Name:</strong></label><br>
                <input type="text" id="userName" placeholder="Enter your name" oninput="calculateTotal()" 
                       style="padding: 10px; width: 60%; border: 2px solid #333; border-radius: 4px; background: white; color: black; margin: 10px auto; display: block;">
            </div>

            <div style="margin-bottom: 20px;">
                <label for="roomType"><strong>Select Your Room:</strong></label><br>
                <select id="roomType" onchange="calculateTotal()" 
                        style="padding: 10px; width: 63%; border: 2px solid #333; border-radius: 4px; background: white; color: black; margin: 10px auto; display: block;">
                    <option value="0">-- Select a Room --</option>
                    <option value="120">Pharaoh Room ($120/night)</option>
                    <option value="300">Champion Room ($300/night)</option>
                </select>
            </div>

            <div style="margin-bottom: 20px;">
                <div style="display: inline-block; margin: 0 15px;">
                    <label for="checkIn"><strong>Check-in:</strong></label><br>
                    <input type="date" id="checkIn" onchange="calculateTotal()" 
                           style="padding: 10px; border: 2px solid #333; border-radius: 4px; background: white; color: black;">
                </div>
                <div style="display: inline-block; margin: 0 15px;">
                    <label for="checkOut"><strong>Check-out:</strong></label><br>
                    <input type="date" id="checkOut" onchange="calculateTotal()" 
                           style="padding: 10px; border: 2px solid #333; border-radius: 4px; background: white; color: black;">
                </div>
            </div>

            <p id="nightCount" style="font-weight: bold; color: #d32f2f; font-size: 1.2em;">Nights: 0</p>

            <hr style="border: 0; border-top: 2px solid #333; margin: 25px 0;">

            <h2 style="font-size: 1.8em;">Additional Benefits</h2>

            <div style="display: inline-block; text-align: left; margin: auto;">
                <div style="padding: 5px 0;">
                    <input type="checkbox" id="parking" onchange="calculateTotal()" style="transform: scale(1.2);">
                    <label for="parking" style="font-size: 1.1em; margin-left: 10px;">Elite Parking — $80</label>
                </div>
                <div style="padding: 5px 0;">
                    <input type="checkbox" id="review" onchange="calculateTotal()" style="transform: scale(1.2);">
                    <label for="review" style="font-size: 1.1em; margin-left: 10px;">Professional Deck Review — $150</label>
                </div>
                <div style="padding: 5px 0;">
                    <input type="checkbox" id="vip" onchange="calculateTotal()" style="transform: scale(1.2);">
                    <label for="vip" style="font-size: 1.1em; margin-left: 10px;">VIP Pass — $200</label>
                </div>
            </div>
        </form>

        <div style="margin-top: 30px; border-top: 3px solid #000; padding-top: 20px;">
            <p id="subtotalDisplay" style="font-size: 1.2em;">Subtotal: $0.00</p>
            <p id="taxDisplay" style="font-size: 1.2em;">Tax (8%): $0.00</p>
            <h2 id="totalDisplay" style="color: #000; font-size: 2em; margin-top: 10px;">Total: $0.00</h2>
        </div>

        <button id="submitBtn" type="button" onclick="submitOrder()" 
                style="padding: 15px 30px; cursor: pointer; background-color: #d32f2f; color: #fff; border: 2px solid #000; border-radius: 8px; margin: 20px auto; display: none; font-size: 1.3em; width: 60%; font-weight: bold; text-transform: uppercase;">
            Place Order
        </button>
    </main>

    <footer style="text-align: center; padding: 20px; font-style: italic;">
        Copyright &copy; 2024 WebMaster
    </footer>
</div>
	<script src="scripts/additional_benefits.js"></script>


</body>
</html>
